<!DOCTYPE html>
<html>
<head>
  <title>NGR Dashboard</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0f14;
      color:white;
    }

    .topbar{
      background:linear-gradient(90deg, green, black, red);
      padding:15px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .container{
      display:flex;
    }

    .sidebar{
      width:220px;
      height:100vh;
      background:#111;
      padding:15px;
    }

    .sidebar h3{
      color:#00ff99;
    }

    .menu div{
      padding:10px;
      margin:8px 0;
      background:#1a1a1a;
      border-radius:6px;
      cursor:pointer;
    }

    .menu div:hover{
      background:#00ff99;
      color:black;
    }

    .main{
      flex:1;
      padding:20px;
    }

    .cards{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .card{
      background:#151b22;
      padding:15px;
      border-radius:10px;
      width:200px;
      border:1px solid #00ff99;
    }

    .card h4{
      color:#00ff99;
    }

    button{
      padding:10px;
      background:red;
      color:white;
      border:none;
      margin-top:20px;
      cursor:pointer;
      width:100%;
    }
  </style>
</head>

<body>

<div class="topbar">
  🇦🇫 NGR ACADEMY DASHBOARD 🇦🇫
</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h3>Menu</h3>

    <div class="menu">
      <div>📊 Crypto Trading</div>
      <div>📈 Forex Market</div>
      <div>📉 TradingView Analysis</div>
      <div>⚡ Binary Options</div>
      <div>💼 Portfolio</div>
    </div>

    <button onclick="logout()">Logout</button>

  </div>

  <!-- MAIN -->
  <div class="main">

    <h2 id="welcome"></h2>

    <div class="cards">

      <div class="card">
        <h4>Bitcoin</h4>
        <p>$ 65,000</p>
      </div>

      <div class="card">
        <h4>Ethereum</h4>
        <p>$ 3,
