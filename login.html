<!DOCTYPE html>
<html>
<head>
  <title>NGR Login</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#0b0f14;
      color:white;
    }

    .box{
      background:#111;
      padding:25px;
      width:320px;
      border-radius:12px;
      border:1px solid #00ff99;
      box-shadow:0 0 20px rgba(0,255,153,0.2);
      text-align:center;
    }

    h2{
      color:#00ff99;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:6px;
      outline:none;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }

    .login{
      background:linear-gradient(90deg,#00ff99,#00ccff);
      color:black;
    }

    .register{
      background:#333;
      color:white;
    }

    .text{
      font-size:12px;
      color:#aaa;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login to NGR Academy</h2>

  <input type="text" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button class="login" onclick="login()">Login</button>
  <button class="register" onclick="register()">Register</button>

  <div class="text">
    Crypto • Forex • TradingView • Binary Options
  </div>
</div>

<!-- 🔥 FIREBASE FULL SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  createUserWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAiq7rfMUifp4kkoeL60g7c26UO8OEJQfg",
  authDomain: "ngr-academy.firebaseapp.com",
  projectId: "ngr-academy",
  storageBucket: "ngr-academy.firebasestorage.app",
  messagingSenderId: "705759043271",
  appId: "1:705759043271:web:c34f803d22b37bfb7128e2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 LOGIN
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      localStorage.setItem("user", email);
      window.location.href = "dashboard.html";
    })
    .catch((error) => {
      alert(error.message);
    });
};

// 🆕 REGISTER
window.register = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Account Created Successfully 🚀");
    })
    .catch((error) => {
      alert(error.message);
    });
};
</script>

</body>
</html>
