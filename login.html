<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body{font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#f2f2f2;}
    .box{background:white;padding:20px;width:300px;border-radius:10px;}
    input{width:100%;padding:10px;margin:10px 0;}
    button{width:100%;padding:10px;margin:5px 0;}
  </style>
</head>

<body><body>

  <!-- login form -->
  <div class="box">
    <input id="email">
    <input id="password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>

  <!-- 🔥 دلته دا script paste کړه -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAiq7rfMUifp4kkoeL60g7c26UO8OEJQfg",
      authDomain: "ngr-academy.firebaseapp.com",
      projectId: "ngr-academy",
      storageBucket: "ngr-academy.firebasestorage.app",
      messagingSenderId: "705759043271",
      appId: "1:705759043271:web:c34f803d22b37bfb7128e2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          localStorage.setItem("user", email);
          window.location.href = "dashboard.html";
        })
        .catch((error) => {
          alert(error.message);
        });
    };

    window.register = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          alert("Account Created!");
        })
        .catch((error) => {
          alert(error.message);
        });
    };
  </script>

</body>

<div class="box">
  <h2>Login</h2>

  <input type="text" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAiq7rfMUifp4kkoeL60g7c26UO8OEJQfg",
  authDomain: "ngr-academy.firebaseapp.com",
  projectId: "ngr-academy",
  storageBucket: "ngr-academy.firebasestorage.app",
  messagingSenderId: "705759043271",
  appId: "1:705759043271:web:c34f803d22b37bfb7128e2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
window.login = function () {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  signInWithEmailAndPassword(auth, email, password)
  .then(() => {
    localStorage.setItem('user', email);
    window.location.href = "dashboard.html";
  })
  .catch(e => alert(e.message));
};

// REGISTER
window.register = function () {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  createUserWithEmailAndPassword(auth, email, password)
  .then(() => {
    alert("Account Created!");
  })
  .catch(e => alert(e.message));
};
</script>

</body>
